<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No.1 Delivery — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#00479f;--brand-mid:#4b7fb9;--brand-light:#79a1cb;
  --brand-pale:#b4cbe1;--brand-surface:#e5ebef;
  --bg:#f0f4f8;--surface:#ffffff;--border:#b4cbe1;--border2:#79a1cb;
  --text:#1a1a2e;--text2:#565656;--text3:#a3a4a4;
  --green:#1a7a4a;--green-bg:#e8f5ee;--green-border:#7ec8a0;
  --red:#b91c1c;--red-bg:#fef2f2;--red-border:#fca5a5;
  --radius:10px;--radius-lg:16px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
body{
  background:var(--brand);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-wrap{width:100%;max-width:420px}

/* BRAND HEADER */
.brand{text-align:center;margin-bottom:32px}
.brand-logo{width:64px;height:64px;background:rgba(255,255,255,.15);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
.brand-name{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.3px}
.brand-sub{font-size:13px;color:rgba(255,255,255,.65);margin-top:4px}

/* CARD */
.card{background:var(--surface);border-radius:var(--radius-lg);padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2)}

/* TABS */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:24px;background:var(--bg);border-radius:var(--radius);padding:4px}
.tab-btn{padding:10px;border-radius:8px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab-btn.active{background:var(--surface);color:var(--brand);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* FORM */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.4px;text-transform:uppercase}
.form-input{border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface);width:100%;transition:border .15s;outline:none}
.form-input:focus{border-color:var(--brand)}
.btn-primary{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:6px}
.btn-primary:hover{background:#003a85}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}

/* PIN PAD */
.pin-display{display:flex;justify-content:center;gap:10px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);transition:all .2s}
.pin-dot.filled{background:var(--brand);border-color:var(--brand)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-dot.success{background:var(--green);border-color:var(--green)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-btn{padding:18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--font);font-size:20px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.pin-btn:hover{background:var(--brand-surface);border-color:var(--brand-light)}
.pin-btn:active{transform:scale(.95);background:var(--brand);color:#fff;border-color:var(--brand)}
.pin-btn.back{font-size:18px;color:var(--text2)}
.pin-btn.clear{font-size:13px;color:var(--red);border-color:var(--red-border)}
.pin-sub{font-size:9px;font-weight:400;color:var(--text3);letter-spacing:.5px;line-height:1}

/* ERROR / SUCCESS */
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert-error{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.alert-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

/* LOADING SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PIN NAME DISPLAY */
.pin-name{text-align:center;padding:12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--radius);margin-bottom:14px;font-size:14px;font-weight:600;color:var(--green);display:none}

/* FOOTER */
.login-footer{text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,.45)}

.view{display:none}.view.active{display:block}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">🚛</div>
    <div class="brand-name">No.1 Delivery</div>
    <div class="brand-sub">Prestons Branch · Delivery Management</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-email" onclick="switchTab('email')">
        💼 Office / Manager
      </button>
      <button class="tab-btn" id="tab-pin" onclick="switchTab('pin')">
        🔢 Warehouse / Driver
      </button>
    </div>

    <!-- EMAIL LOGIN -->
    <div class="view active" id="view-email">
      <div class="alert alert-error" id="email-error"></div>
      <div class="form-group">
        <div class="form-label">Email address</div>
        <input class="form-input" type="email" id="email-input" placeholder="you@no1roofing.com.au" autocomplete="email">
      </div>
      <div class="form-group">
        <div class="form-label">Password</div>
        <input class="form-input" type="password" id="password-input" placeholder="Your password" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="email-btn" onclick="loginEmail()">Sign in</button>
      <div style="text-align:center;margin-top:14px">
        <a href="#" onclick="showForgotPassword()" style="font-size:12px;color:var(--brand-mid);text-decoration:none">Forgot password?</a>
      </div>
    </div>

    <!-- PIN LOGIN -->
    <div class="view" id="view-pin">
      <div class="alert alert-error" id="pin-error"></div>
      <div class="pin-name" id="pin-name"></div>
      <div style="text-align:center;margin-bottom:16px;font-size:13px;color:var(--text2)">Enter your 4-digit PIN</div>
      <div class="pin-display">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
      </div>
      <div class="pin-grid">
        <button class="pin-btn" onclick="pinPress('1')">1<span class="pin-sub"></span></button>
        <button class="pin-btn" onclick="pinPress('2')">2<span class="pin-sub">ABC</span></button>
        <button class="pin-btn" onclick="pinPress('3')">3<span class="pin-sub">DEF</span></button>
        <button class="pin-btn" onclick="pinPress('4')">4<span class="pin-sub">GHI</span></button>
        <button class="pin-btn" onclick="pinPress('5')">5<span class="pin-sub">JKL</span></button>
        <button class="pin-btn" onclick="pinPress('6')">6<span class="pin-sub">MNO</span></button>
        <button class="pin-btn" onclick="pinPress('7')">7<span class="pin-sub">PQRS</span></button>
        <button class="pin-btn" onclick="pinPress('8')">8<span class="pin-sub">TUV</span></button>
        <button class="pin-btn" onclick="pinPress('9')">9<span class="pin-sub">WXYZ</span></button>
        <button class="pin-btn clear" onclick="pinClear()">Clear</button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn back" onclick="pinBack()">⌫</button>
      </div>
    </div>
  </div>

  <div class="login-footer">No.1 Delivery System · Prestons Branch</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// =============================================
// CONFIGURATION — replace these two values
// =============================================
const SUPABASE_URL = 'https://mnhwcuawsdxeyzqkjdwq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uaHdjdWF3c2R4ZXl6cWtqZHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjM1ODksImV4cCI6MjA5NTU5OTU4OX0.ALToJk7zpFYRLZPwoAN7d8EHsU6AE0wNKfNxVCoS_tk';
// =============================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Role to page routing
const ROLE_ROUTES = {
  super_admin:       'dashboard.html',
  branch_manager:    'dashboard.html',
  planner:           'dashboard.html',
  driver:            'driver.html',
  picker:            'picker.html',
  branch_requester:  'request.html'
};

// ---- TAB SWITCHING ----
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  clearErrors();
  if(tab === 'pin') pinClear();
}

function clearErrors() {
  document.querySelectorAll('.alert').forEach(a => {
    a.classList.remove('show');
    a.textContent = '';
  });
}

function showError(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.classList.add('show');
}

// ---- EMAIL LOGIN ----
async function loginEmail() {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const btn = document.getElementById('email-btn');
  clearErrors();

  if (!email || !password) {
    showError('email-error', 'Please enter your email and password.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    // Fetch staff record to get role
    const { data: staff, error: staffErr } = await sb
      .from('staff')
      .select('role, name, branch_id, active')
      .eq('auth_user_id', data.user.id)
      .single();

    if (staffErr || !staff) throw new Error('Staff record not found. Contact your manager.');
    if (!staff.active) throw new Error('Your account has been deactivated. Contact your manager.');

    // Store session info
    sessionStorage.setItem('staff_role', staff.role);
    sessionStorage.setItem('staff_name', staff.name);
    sessionStorage.setItem('branch_id', staff.branch_id);

    // Route to correct page
    const route = ROLE_ROUTES[staff.role] || 'dashboard.html';
    btn.innerHTML = '<span class="spinner"></span>Redirecting...';
    setTimeout(() => { window.location.href = route; }, 500);

  } catch(err) {
    showError('email-error', err.message || 'Login failed. Please try again.');
    btn.disabled = false;
    btn.innerHTML = 'Sign in';
  }
}

// Allow Enter key on password field
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('password-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginEmail();
  });
  document.getElementById('email-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password-input').focus();
  });
});

// ---- PIN LOGIN ----
let pin = '';
let pinLocked = false;

function pinPress(digit) {
  if (pinLocked || pin.length >= 4) return;
  pin += digit;
  updatePinDisplay();
  clearErrors();
  if (pin.length === 4) {
    setTimeout(() => verifyPin(), 200);
  }
}

function pinBack() {
  if (pinLocked) return;
  pin = pin.slice(0, -1);
  updatePinDisplay();
  clearErrors();
  document.getElementById('pin-name').style.display = 'none';
}

function pinClear() {
  pin = '';
  pinLocked = false;
  updatePinDisplay('reset');
  clearErrors();
  document.getElementById('pin-name').style.display = 'none';
}

function updatePinDisplay(state) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.classList.remove('filled', 'error', 'success');
    if (state === 'error') { if (i < 4) dot.classList.add('error'); }
    else if (state === 'success') { dot.classList.add('success'); }
    else if (i < pin.length) { dot.classList.add('filled'); }
  }
}

async function verifyPin() {
  pinLocked = true;

  // Hash the PIN using SHA-256 to match stored hash
  const encoder = new TextEncoder();
  const data = encoder.encode(pin);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const pinHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  try {
    const { data: staff, error } = await sb
      .from('staff')
      .select('id, name, role, branch_id, active, pin_hash')
      .eq('pin_hash', pinHash)
      .eq('active', true)
      .single();

    if (error || !staff) {
      updatePinDisplay('error');
      showError('pin-error', 'Incorrect PIN. Please try again.');
      setTimeout(() => { pinClear(); }, 1500);
      return;
    }

    // Success
    updatePinDisplay('success');
    const nameEl = document.getElementById('pin-name');
    nameEl.textContent = '👋 Welcome, ' + staff.name;
    nameEl.style.display = 'block';

    // Store session info
    sessionStorage.setItem('staff_id', staff.id);
    sessionStorage.setItem('staff_role', staff.role);
    sessionStorage.setItem('staff_name', staff.name);
    sessionStorage.setItem('branch_id', staff.branch_id);
    sessionStorage.setItem('pin_auth', 'true');

    // Route to correct page after short delay
    const route = ROLE_ROUTES[staff.role] || 'dashboard.html';
    setTimeout(() => { window.location.href = route; }, 1000);

  } catch(err) {
    updatePinDisplay('error');
    showError('pin-error', 'Something went wrong. Please try again.');
    setTimeout(() => { pinClear(); }, 1500);
  }
}

// ---- FORGOT PASSWORD ----
async function showForgotPassword() {
  const email = document.getElementById('email-input').value.trim();
  if (!email) {
    showError('email-error', 'Enter your email address above first, then click Forgot password.');
    return;
  }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  });
  if (error) {
    showError('email-error', 'Could not send reset email. Check the address and try again.');
  } else {
    const el = document.getElementById('email-error');
    el.textContent = '✓ Reset email sent. Check your inbox.';
    el.className = 'alert alert-success show';
  }
}

// ---- CHECK IF ALREADY LOGGED IN ----
// If user navigates back to login page while already logged in, redirect them
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: staff } = await sb
      .from('staff')
      .select('role')
      .eq('auth_user_id', session.user.id)
      .single();
    if (staff) {
      window.location.href = ROLE_ROUTES[staff.role] || 'dashboard.html';
    }
  }
})();
</script>
</body>
</html>
