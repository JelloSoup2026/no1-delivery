<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No.1 Delivery — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#00479f;--bg:#f0f4f8;--surface:#fff;--border:#b4cbe1;--text:#1a1a2e;--text2:#565656;--green:#1a7a4a;--green-bg:#e8f5ee;--green-border:#7ec8a0;--red:#b91c1c;--red-bg:#fef2f2;--red-border:#fca5a5;--radius:10px;--radius-lg:16px;--font:'DM Sans',system-ui,sans-serif;}
body{background:var(--brand);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--surface);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.brand{text-align:center;margin-bottom:24px}
.brand-name{font-size:18px;font-weight:700;color:var(--brand)}
.brand-sub{font-size:12px;color:var(--text2);margin-top:2px}
h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.desc{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.4px;text-transform:uppercase}
.form-input{border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface);width:100%;outline:none;transition:border .15s}
.form-input:focus{border-color:var(--brand)}
.btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#003a85}
.btn:disabled{opacity:.6;cursor:not-allowed}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert-error{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.alert-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-name">No.1 Delivery</div>
    <div class="brand-sub">Prestons Branch</div>
  </div>
  <h2>Set new password</h2>
  <p class="desc">Enter your new password below. Make it at least 8 characters.</p>
  <div class="alert alert-error" id="error-msg"></div>
  <div class="alert alert-success" id="success-msg"></div>
  <div id="form-wrap">
    <div class="form-group">
      <div class="form-label">New password</div>
      <input class="form-input" type="password" id="new-password" placeholder="At least 8 characters">
    </div>
    <div class="form-group">
      <div class="form-label">Confirm password</div>
      <input class="form-input" type="password" id="confirm-password" placeholder="Repeat your new password">
    </div>
    <button class="btn" id="reset-btn" onclick="resetPassword()">Set new password</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://mnhwcuawsdxeyzqkjdwq.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uaHdjdWF3c2R4ZXl6cWtqZHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjM1ODksImV4cCI6MjA5NTU5OTU4OX0.ALToJk7zpFYRLZPwoAN7d8EHsU6AE0wNKfNxVCoS_tk';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function showError(msg){
  const el=document.getElementById('error-msg');
  el.textContent=msg;el.classList.add('show');
  document.getElementById('success-msg').classList.remove('show');
}
function showSuccess(msg){
  const el=document.getElementById('success-msg');
  el.textContent=msg;el.classList.add('show');
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('form-wrap').style.display='none';
}

async function resetPassword(){
  const pw=document.getElementById('new-password').value;
  const pw2=document.getElementById('confirm-password').value;
  const btn=document.getElementById('reset-btn');
  if(!pw||pw.length<8){showError('Password must be at least 8 characters.');return;}
  if(pw!==pw2){showError('Passwords do not match.');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Updating...';
  const {error}=await sb.auth.updateUser({password:pw});
  if(error){
    showError(error.message||'Could not update password. Try again.');
    btn.disabled=false;btn.innerHTML='Set new password';
  } else {
    showSuccess('✓ Password updated successfully. Redirecting to login...');
    setTimeout(()=>{window.location.href='login.html';},2000);
  }
}
</script>
</body>
</html>
